<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antes e Depois</title>
    <script defer src="https://cdn.jsdelivr.net/npm/img-comparison-slider@8/dist/index.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/img-comparison-slider@8/dist/styles.css"/>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: transparent; }
        img-comparison-slider { width: 100%; max-width: 800px; outline: none; }
        img { width: 100%; height: auto; object-fit: cover; }
    </style>
</head>
<body>

    <img-comparison-slider>
      <img slot="first" src="ANTES.jpeg" alt="Antes" />
      <img slot="second" src="DEPOIS.jpeg" alt="Depois" />
    </img-comparison-slider>

</body>
</html>
