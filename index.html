<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antes e Depois</title>

    <script defer src="https://cdn.jsdelivr.net/npm/img-comparison-slider@8/dist/index.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/img-comparison-slider@8/dist/styles.css"/>

    <style>
        body { 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background-color: transparent; 
            padding: 20px;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        .wrapper {
            width: 100%;
            max-width: 600px; 
            position: relative;
        }

        img-comparison-slider { 
            width: 100%; 
            outline: none;

            --divider-width: 2px;
            --divider-color: #ffffff;
            --handle-color: #ffffff;
        }

        img { 
            width: 100%; 
            height: auto; 
            display: block; 
        }

        /* TEXTOS */
        .label {
            position: absolute;
            top: 10px;
            padding: 5px 10px;
            font-size: 12px;
            color: white;
            background: rgba(0,0,0,0.5);
            border-radius: 5px;
            z-index: 10;
            pointer-events: none;
        }

        .antes {
            left: 10px;
        }

        .depois {
            right: 10px;
        }

    </style>
</head>

<body>

    <div class="wrapper">

        <!-- TEXTOS -->
        <div class="label antes">ANTES</div>
        <div class="label depois">DEPOIS</div>

        <!-- SLIDER -->
        <img-comparison-slider direction="horizontal">
            <img slot="first" src="DEPOIS.jpeg" alt="Depois" />
            <img slot="second" src="ANTES.jpeg" alt="Antes" />
        </img-comparison-slider>

    </div>

</body>
</html>
