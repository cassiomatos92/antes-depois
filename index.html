<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antes e Depois</title>

    <!-- Biblioteca -->
    <script defer src="https://cdn.jsdelivr.net/npm/img-comparison-slider@8/dist/index.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/img-comparison-slider@8/dist/styles.css"/>

    <style>
        body { 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background-color: transparent; 
            padding: 20px;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        .wrapper {
            width: 100%;
            max-width: 600px; 
            position: relative;
        }

        img-comparison-slider { 
            width: 100%; 
            outline: none;

            /* Linha do meio */
            --divider-width: 3px;
            --divider-color: #ffffff;
            --handle-color: #ffffff;
        }

        img { 
            width: 100%; 
            height: auto; 
            display: block; 
        }

        /* LABELS */
        .label {
            position: absolute;
            top: 15px;
            padding: 6px 12px;
            font-size: 11px;
            color: white;
            background: rgba(0,0,0,0.7);
            border-radius: 20px;
            z-index: 10;
            pointer-events: none;
            font-weight: 600;
            letter-spacing: 1px;
            backdrop-filter: blur(4px);
        }

        .antes {
            left: 15px;
        }

        .depois {
            right: 15px;
        }

        /* TEXTO INFERIOR */
        .hint {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 12px;
            background: rgba(0,0,0,0.6);
            padding: 6px 12px;
            border-radius: 20px;
            pointer-events: none;
        }

    </style>
</head>

<body>

    <div class="wrapper">

        <!-- TEXTOS (estratégico: mostra resultado primeiro) -->
        <div class="label antes">DEPOIS</div>
        <div class="label depois">ANTES</div>

        <!-- SLIDER -->
        <img-comparison-slider direction="horizontal">
            <img slot="first" src="DEPOIS.jpeg" alt="Depois" />
            <img slot="second" src="ANTES.jpeg" alt="Antes" />
        </img-comparison-slider>

        <!-- TEXTO -->
        <div class="hint">Arraste para ver</div>

    </div>

</body>
</html>
