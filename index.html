<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antes e Depois Maternidade</title>
    <script defer src="https://cdn.jsdelivr.net/npm/img-comparison-slider@8/dist/index.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/img-comparison-slider@8/dist/styles.css"/>
    <style>
        body { 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background-color: #f9f9f9; /* Fundo suave para contraste */
            font-family: sans-serif;
        }

        /* O SEGREDO ESTÁ AQUI: Criei um contêiner wrapper com altura fixa */
        .wrapper {
            width: 100%;
            max-width: 600px; /* Largura máxima do slider na tela */
            height: 80vh; /* Altura fixa para o viewport (80% da altura da tela) */
            position: relative;
            overflow: hidden; /* Garante que nada escape do contêiner */
            border: 2px solid #ccc; /* Uma borda fina para definição */
            border-radius: 8px; /* Cantos arredondados opcionais */
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); /* Sombra suave opcional */
        }

        img-comparison-slider { 
            width: 100%; 
            height: 100%; /* O slider preenche toda a altura do wrapper */
            outline: none; 
        }

        img { 
            width: 100%; 
            height: 100%; /* A imagem preenche todo o slider */
            object-fit: cover; /* Faz a imagem cobrir a área sem distorcer a proporção, mas centralizando o corte */
            object-position: center; /* Centraliza a imagem no corte */
        }

        /* Personalização da linha divisória e do círculo handle */
        img-comparison-slider {
            --divider-width: 2px;
            --divider-color: #fff;
            --handle-color: #fff;
            --handle-width: 20px;
            --handle-height: 20px;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <img-comparison-slider direction="vertical">
          <img slot="first" src="ANTES.jpeg" alt="Foto original (com fundo vermelho)" />
          <img slot="second" src="DEPOIS.jpeg" alt="Foto editada (com fundo branco)" />
        </img-comparison-slider>
    </div>

</body>
</html>
