<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antes e Depois Maternidade - Alinhamento Perfeito</title>
    <script defer src="https://cdn.jsdelivr.net/npm/img-comparison-slider@8/dist/index.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/img-comparison-slider@8/dist/styles.css"/>
    <style>
        body { 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background-color: #f5f5f5; /* Um cinza muito claro para contraste suave */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px; /* Respiro em telas menores */
        }

        /* Contêiner wrapper polido e responsivo */
        .wrapper {
            width: 100%;
            max-width: 700px; /* Largura máxima ideal para telas de laptop */
            margin: auto;
            border: 1px solid #e0e0e0;
            border-radius: 12px; /* Cantos arredondados suaves */
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); /* Sombra elegante */
            overflow: hidden; /* Mantém as imagens dentro dos cantos arredondados */
            background-color: white;
            line-height: 0; /* Corrige espaço em branco extra abaixo das imagens */
        }

        img-comparison-slider { 
            width: 100%; 
            outline: none; 
        }

        img { 
            width: 100%; 
            height: auto; /* Deixa a altura ser definida proporcionalmente pela largura */
            display: block;
        }

        /* Customização da barra divisória e do handle */
        img-comparison-slider {
            /* Personalize a linha divisória */
            --divider-width: 3px;
            --divider-color: rgba(255,255,255,0.7); /* Branco semitransparente */
            
            /* Personalize o círculo de controle (handle) */
            --handle-color: rgba(255,255,255,0.9); /* Branco quase sólido */
            --handle-width: 35px;
            --handle-height: 35px;
            --handle-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        /* Adicionando rótulos "Antes" e "Depois" (opcional, remova se não quiser) */
        .label {
            position: absolute;
            bottom: 20px;
            padding: 8px 15px;
            background-color: rgba(0,0,0,0.6);
            color: white;
            font-size: 14px;
            border-radius: 20px;
            pointer-events: none; /* Garante que o rótulo não interfira no slider */
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .antes { left: 20px; }
        .depois { right: 20px; }

    </style>
</head>
<body>

    <div class="wrapper">
        <img-comparison-slider direction="vertical">
          <img slot="first" src="ANTES.jpeg" alt="Antes - Foto original com cenário vermelho" />
          <img slot="second" src="DEPOIS.jpeg" alt="Depois - Foto editada com cenário de tecidos" />
          
          <span slot="first" class="label antes">Antes</span>
          <span slot="second" class="label depois">Depois</span>
        </img-comparison-slider>
    </div>

</body>
</html>
