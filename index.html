<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antes e Depois</title>

    <!-- Biblioteca -->
    <script defer src="https://cdn.jsdelivr.net/npm/img-comparison-slider@8/dist/index.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/img-comparison-slider@8/dist/styles.css"/>

    <style>
        body { 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background-color: transparent; 
            padding: 20px;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        .wrapper {
            width: 100%;
            max-width: 600px; 
            margin: 0 auto;
            position: relative;
        }

        img-comparison-slider { 
            width: 100%; 
            outline: none;

            /* Estilo do slider */
            --divider-width: 2px;
            --divider-color: #ffffff;
            --handle-color: #ffffff;
        }

        img { 
            width: 100%; 
            height: auto; 
            display: block; 
        }

        /* Texto "Arraste" */
        .hint {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 14px;
            background: rgba(0,0,0,0.5);
            padding: 6px 12px;
            border-radius: 20px;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <div class="wrapper">

        <!-- Slider corrigido -->
        <img-comparison-slider direction="horizontal">
            <!-- Mostra o DEPOIS primeiro (mais impacto) -->
            <img slot="first" src="DEPOIS.jpeg" alt="Depois" />
            <img slot="second" src="ANTES.jpeg" alt="Antes" />
        </img-comparison-slider>

        <div class="hint">Arraste</div>

    </div>

</body>
</html>
